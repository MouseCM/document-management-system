worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;

  # Gzip compression for text assets
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain text/css text/javascript application/javascript
    application/json text/xml application/xml image/svg+xml;

  # ─── TLS 1.3 only upstream ───────────────────────────────────────────────────
  server {
    listen 8443 ssl;
    server_name _;

    # TLS 1.3 exclusively — drop all legacy versions.
    ssl_protocols TLSv1.3;
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_prefer_server_ciphers off; # not needed for TLS 1.3

    # HSTS: force HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers (supplement what the Node app already sends)
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-Frame-Options          "DENY" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Cache static assets served through Node
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|ico)$ {
      proxy_pass http://app:3000;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "public, max-age=3600, immutable";
    }

    # All other requests → Node app (no caching)
    location / {
      proxy_pass http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header Connection        "";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
      client_max_body_size 6m;
    }
  }

  # Redirect plain HTTP to HTTPS
  server {
    listen 8080;
    server_name _;
    return 301 https://$host:8443$request_uri;
  }
}
